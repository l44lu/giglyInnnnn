name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend - Install and lint
        working-directory: ./backend
        run: |
          npm install
          npx prisma generate
          npm run lint

      - name: Frontend - Install and lint
        working-directory: ./frontend
        run: |
          npm install
          npm run lint